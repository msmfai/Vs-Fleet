<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fleet</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header data-tauri-drag-region>
      <span class="brand">Fleet</span>
      <span id="status" class="status" aria-live="polite">connecting…</span>
      <div class="header-actions">
        <button id="jump" class="tool-button unread-button" type="button" title="Open next unread session" aria-label="Open next unread session">Unread</button>
        <button id="palette-open" class="tool-button" type="button" title="Session palette" aria-label="Session palette">⌕</button>
        <button id="spawn" class="spawn" type="button" title="New server" aria-label="New server">+</button>
      </div>
    </header>
    <div id="status-detail" class="status-detail hidden" role="status" aria-live="polite"></div>
    <main id="rail" aria-label="Fleet sessions" aria-describedby="status" aria-busy="true">
      <p class="empty">Loading.</p>
    </main>
    <div id="palette" class="palette hidden" role="dialog" aria-modal="true" aria-label="Session palette">
      <div class="palette-panel">
        <input id="palette-input" class="palette-input" type="text" autocomplete="off" spellcheck="false" role="combobox" aria-controls="palette-list" aria-expanded="false" aria-autocomplete="list" aria-label="Search sessions" placeholder="Search sessions" />
        <div id="palette-list" class="palette-list" role="listbox"></div>
      </div>
    </div>
    <div id="row-menu" class="row-menu hidden" role="menu" aria-label="Session actions"></div>
    <script src="main.js"></script>
  </body>
</html>
