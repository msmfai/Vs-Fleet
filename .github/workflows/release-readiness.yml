name: Release Readiness

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  release-gate:
    name: Public alpha gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install release gate tools
        run: |
          if ! command -v rg >/dev/null 2>&1 || ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq ripgrep
          fi

      - name: Owner decision gate self-test
        run: ./scripts/test-owner-decision-gate.sh

      - name: Owner decision draft helper self-test
        run: ./scripts/test-draft-owner-decisions.sh

      - name: Public alpha decision packet self-test
        run: ./scripts/test-public-alpha-decision-packet.sh

      - name: Owner release approval sheet self-test
        run: ./scripts/test-owner-release-approval-check.sh

      - name: Public alpha readiness assessment self-test
        run: ./scripts/test-public-alpha-readiness-assessment-check.sh

      - name: License decision gate self-test
        run: ./scripts/test-license-decision-check.sh

      - name: License decision apply helper self-test
        run: ./scripts/test-apply-license-decision.sh

      - name: License intent gate self-test
        run: ./scripts/test-license-intent-check.sh

      - name: DCO sign-off gate self-test
        run: ./scripts/test-dco-signoff.sh

      - name: Namespace decision gate self-test
        run: ./scripts/test-namespace-decision-check.sh

      - name: Namespace decision apply helper self-test
        run: ./scripts/test-apply-namespace-decision.sh

      - name: Alpha scope decision gate self-test
        run: ./scripts/test-alpha-scope-decision-check.sh

      - name: Editor server boundary gate self-test
        run: ./scripts/test-editor-server-boundary-decision-check.sh

      - name: Distribution decision gate self-test
        run: ./scripts/test-distribution-decision-check.sh

      - name: Security reporting gate self-test
        run: ./scripts/test-security-reporting-decision-check.sh

      - name: Contribution decision gate self-test
        run: ./scripts/test-contribution-decision-check.sh

      - name: GitHub intake template gate self-test
        run: ./scripts/test-github-intake-templates-check.sh

      - name: Documentation link gate self-test
        run: ./scripts/test-doc-link-check.sh

      - name: Public tree size gate self-test
        run: ./scripts/test-public-tree-size-check.sh

      - name: Lockfile policy gate self-test
        run: ./scripts/test-lockfile-policy-check.sh

      - name: Public CI evidence gate self-test
        run: ./scripts/test-ci-evidence-decision-check.sh

      - name: GitHub workflow gate self-test
        run: ./scripts/test-github-workflows-check.sh

      - name: Dependabot config gate self-test
        run: ./scripts/test-dependabot-config-check.sh

      - name: Privacy decision gate self-test
        run: ./scripts/test-privacy-decision-check.sh

      - name: Dependency review gate self-test
        run: ./scripts/test-dependency-review-decision-check.sh

      - name: Dependency review runner self-test
        run: ./scripts/test-dependency-review-runner.sh

      - name: Support decision gate self-test
        run: ./scripts/test-support-decision-check.sh

      - name: Branding decision gate self-test
        run: ./scripts/test-branding-decision-check.sh

      - name: Versioning decision gate self-test
        run: ./scripts/test-versioning-decision-check.sh

      - name: Community intake decision gate self-test
        run: ./scripts/test-community-intake-decision-check.sh

      - name: Release custody decision gate self-test
        run: ./scripts/test-release-custody-decision-check.sh

      - name: AI contribution decision gate self-test
        run: ./scripts/test-ai-contribution-decision-check.sh

      - name: Platform support decision gate self-test
        run: ./scripts/test-platform-support-decision-check.sh

      - name: Roadmap decision gate self-test
        run: ./scripts/test-roadmap-decision-check.sh

      - name: Name collision decision gate self-test
        run: ./scripts/test-name-collision-decision-check.sh

      - name: Local data decision gate self-test
        run: ./scripts/test-local-data-decision-check.sh

      - name: Workflow supply-chain decision gate self-test
        run: ./scripts/test-workflow-supply-chain-decision-check.sh

      - name: GitHub publication evidence gate self-test
        run: ./scripts/test-github-publication-evidence-check.sh

      - name: GitHub publication evidence generator self-test
        run: ./scripts/test-generate-github-publication-evidence.sh

      - name: History release gate self-test
        run: ./scripts/test-history-release-check.sh

      - name: Public branch evidence gate self-test
        run: ./scripts/test-public-branch-evidence-check.sh

      - name: Public branch evidence generator self-test
        run: ./scripts/test-generate-public-branch-evidence.sh

      - name: Public release branch verifier self-test
        run: ./scripts/test-check-public-release-branch.sh

      - name: Public CI evidence generator self-test
        run: ./scripts/test-generate-public-ci-evidence.sh

      - name: Release evidence status self-test
        run: ./scripts/test-release-evidence-status.sh

      - name: Secret release gate self-test
        run: ./scripts/test-secret-release-check.sh

      - name: Release hygiene gate self-test
        run: ./scripts/test-release-check.sh

      - name: Release notes gate self-test
        run: ./scripts/test-release-notes-check.sh

      - name: History exposure gate
        run: ./scripts/history-release-check.sh docs/release/OWNER_DECISION_RECORD.md

      - name: Public branch evidence gate
        run: ./scripts/check-public-branch-evidence.sh docs/release/OWNER_DECISION_RECORD.md docs/release/PUBLIC_BRANCH_EVIDENCE.md "$(git rev-parse HEAD)"

      - name: Secret exposure gate
        run: ./scripts/secret-release-check.sh

      - name: Documentation link gate
        run: ./scripts/check-doc-links.sh

      - name: License intent gate
        run: ./scripts/check-license-intent.sh

      - name: Public tree size gate
        run: ./scripts/check-public-tree-size.sh

      - name: Lockfile policy gate
        run: ./scripts/check-lockfile-policy.sh

      - name: Release hygiene gate
        run: ./scripts/release-check.sh

      - name: Owner decision gate
        run: ./scripts/check-owner-decisions.sh docs/release/OWNER_DECISION_RECORD.md

      - name: Owner release approval sheet gate
        run: ./scripts/check-owner-release-approval.sh docs/release/OWNER_RELEASE_APPROVAL.md

      - name: Verify no generated artifacts are tracked
        run: |
          if git ls-files | rg '(^|/)coverage/|(^|/)node_modules/|(^|/)out/|\.vsix$|Fleet\.app/'; then
            echo "Generated dependency/build output is tracked."
            exit 1
          fi

  source-checks:
    name: Source alpha checks
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Core Rust checks
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          cargo test --workspace --all-targets --all-features

      - name: Fleet bridge checks
        run: |
          cd packages/fleet-bridge
          npm ci
          npm run build

      - name: Fleet host checks
        run: |
          cd crates/fleet-host
          cargo fmt -- --check
          cargo test
          ./bundle.sh release

      - name: Fleet extension checks
        run: |
          cd packages/extension
          npm ci
          npm run build
          npm test
