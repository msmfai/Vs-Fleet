name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  dco:
    name: DCO sign-off
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check DCO sign-offs
        run: ./scripts/check-dco-signoff.sh "origin/${{ github.base_ref }}..HEAD"

  # Static frontend↔backend guards (pure shell, no toolchain): forbid
  # WKWebView-unsupported input APIs (window.prompt/alert/confirm) in ui/ and
  # assert every invoke() call maps to a registered #[tauri::command]. Catches
  # the seam/runtime bug class that 100% unit coverage missed (the rename break).
  frontend-contract:
    name: Frontend contract + webview safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: check-frontend-contract.sh
        run: ./scripts/check-frontend-contract.sh

  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry + build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo build
        run: cargo build --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace --all-targets --all-features

  # The Tauri GUI host is a nested workspace (see root Cargo.toml `exclude`),
  # so the root jobs never compile it. Cover it explicitly on all three OSes,
  # including the keyboard-capture regression contract (see
  # crates/fleet-host/tests/no_keyboard_capture.rs).
  host:
    name: Host (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: crates/fleet-host

    steps:
      - uses: actions/checkout@v6

      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry + build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/fleet-host/target
          key: ${{ runner.os }}-host-cargo-${{ hashFiles('crates/fleet-host/Cargo.toml', 'crates/fleet-host/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-host-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo test
        run: cargo test --all-targets

      - name: cargo test --test no_keyboard_capture
        run: cargo test --test no_keyboard_capture

  coverage:
    name: Coverage (gate floor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust + llvm-tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Cargo registry + build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cov-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cov-

      # Collect once, report several times (avoids re-instrumenting the build).
      - name: Collect coverage
        run: cargo llvm-cov --workspace --all-features --no-report

      - name: Summary
        run: cargo llvm-cov report --summary-only

      # Coverage floors: workspace >= 80%, protocol + hub contracts >= 85%.
      - name: Enforce workspace floor (lines >= 80%)
        run: cargo llvm-cov report --fail-under-lines 80

      - name: Enforce protocol+hub floor (lines >= 85%)
        run: cargo llvm-cov report --package fleet-protocol --package fleet-hub --fail-under-lines 85

  pnpm:
    name: pnpm (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "9"

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: pnpm install
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: pnpm -r build
        run: pnpm -r build

      - name: pnpm -r test
        run: pnpm -r test

  # Layer C: frontend unit tests (vitest + jsdom) for the Tauri rail UI. Runs on
  # CI/Linux only — never locally — and includes the rename/domPrompt/rowTitle
  # regression tests that lock the seam bugs 100% Rust coverage missed.
  frontend-unit:
    name: Frontend unit (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/fleet-host/ui
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: npm install
        run: npm install
      - name: vitest + coverage
        run: npm run coverage

  # Layer E end-to-end: boot the built fleet-host headless under Xvfb with the
  # probe-control port, drive the real command seam (rename round-trip + survives
  # a reporter re-register) over HTTP, asserting observable /servers state.
  host-smoke:
    name: Host smoke (probe E2E)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev xvfb
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/fleet-host/target
          key: ${{ runner.os }}-smoke-cargo-${{ hashFiles('crates/fleet-host/Cargo.toml', 'crates/fleet-host/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-smoke-cargo-
      - name: Build fleet-host (release)
        working-directory: crates/fleet-host
        run: cargo build --release
      - name: Run probe smoke under Xvfb
        run: xvfb-run -a node scripts/release-smoke.mjs --bin crates/fleet-host/target/release/fleet-host --out smoke-out
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: host-smoke-out
          path: smoke-out/
          if-no-files-found: warn
