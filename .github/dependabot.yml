version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "cargo"
    directory: "/crates/fleet-host"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/fleet-bridge"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/extension"
    schedule:
      interval: "weekly"
